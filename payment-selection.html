<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Payment Selection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: gradientShift 3s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .trust-indicators {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            font-size: 14px;
            color: #667eea;
            flex-wrap: wrap;
        }

        .trust-indicators span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        /* Gateway Selection */
        .gateway-section {
            margin-bottom: 40px;
        }

        .section-title {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gateway-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .gateway-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .gateway-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gateway-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .gateway-card:hover::before {
            opacity: 1;
        }

        .gateway-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #eef5ff, #f0f4ff);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .gateway-card.selected::before {
            opacity: 1;
        }

        .gateway-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .gateway-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .razorpay-icon {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .stripe-icon {
            background: linear-gradient(135deg, #635bff, #5848e8);
            color: white;
        }

        .gateway-info h3 {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .gateway-info p {
            color: #666;
            font-size: 14px;
        }

        /* Payment Methods */
        .methods-section {
            margin-bottom: 40px;
        }

        .method-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .method-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
